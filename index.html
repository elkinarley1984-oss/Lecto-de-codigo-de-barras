<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector Universal de Códigos</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0066cc">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lector QR">

<!-- Apple touch icons -->
<link rel="apple-touch-icon" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
  }
  h2 { color: #333; }
  #reader { max-width: 500px; margin: auto; }
  #resultado {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    font-size: 24px;
    font-weight: bold;
    color: #0066cc;
  }
  #install-btn {
    display: none;
    margin: 16px auto;
    padding: 12px 28px;
    background: #0066cc;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }
  #install-btn:hover { background: #004fa3; }
</style>
</head>
<body>

<h2>📷 Lector Universal de Código de Barras</h2>

<button id="install-btn">⬇️ Instalar App</button>

<div id="reader"></div>

<div id="resultado">Esperando lectura...</div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Botón de instalación PWA
let deferredPrompt;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-block';
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBtn.style.display = 'none';
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
});

// Escáner
function onScanSuccess(decodedText) {
  document.getElementById("resultado").innerHTML = decodedText;
  if (navigator.vibrate) navigator.vibrate(200);
}

const scanner = new Html5QrcodeScanner(
  "reader",
  {
    fps: 15,
    qrbox: { width: 280, height: 180 },
    rememberLastUsedCamera: true,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
  }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
