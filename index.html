<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector Universal de Códigos</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
}

h2{
    color:#333;
}

#reader{
    max-width:500px;
    margin:auto;
}

#resultado{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    font-size:24px;
    font-weight:bold;
    color:#0066cc;
}
</style>
</head>

<body>

<h2>📷 Lector Universal de Código de Barras</h2>

<div id="reader"></div>

<div id="resultado">
Esperando lectura...
</div>

<script>

function onScanSuccess(decodedText) {

    document.getElementById("resultado").innerHTML = decodedText;

    if (navigator.vibrate) {
        navigator.vibrate(200);
    }
}

const scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 15,
        qrbox: { width: 280, height: 180 },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
